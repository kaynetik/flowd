id: karpathy-surgical-changes
scope: "**"
level: warn
description: |
  ## 3. Surgical Changes

  **Touch only what you must. Clean up only your own mess.**

  When editing existing code:
  - Don't "improve" adjacent code, comments, or formatting.
  - Don't refactor things that aren't broken.
  - Match existing style, even if you'd do it differently.
  - If you notice unrelated dead code, mention it - don't delete it.

  When your changes create orphans:
  - Remove imports/variables/functions that YOUR changes made unused.
  - Don't remove pre-existing dead code unless asked.

  The test: Every changed line should trace directly to the user's request.

  The rules engine cannot inspect shell command arguments
  (ProposedAction carries no command string), so this rule fires on
  matching tool invocations as advisory guidance surfaced via
  `rules_list`. The agent is responsible for honoring the constraint
  in the actual command it runs. For Write, Edit, and MultiEdit (and
  equivalently named tools), the engine likewise does not inspect edit
  bodies; the agent must apply this guideline in the actual edits it
  makes.
match: "^(Bash|Write|Edit|MultiEdit|shell|shell_exec|run_command|run_terminal_cmd)$"
