- id: commit-message-conventional
  scope: "**"
  level: warn
  description: |
    Use Conventional Commits for individual commits and for the
    integration messages `plan_integrate` ultimately lands on a base
    branch. The shape:

      <type>(<scope>)?: <imperative summary>

    Common types: `feat`, `fix`, `refactor`, `chore`, `docs`, `test`,
    `perf`, `build`, `ci`. Append `!` (or a `BREAKING CHANGE:` footer)
    when the change breaks a documented contract -- public API, MCP
    wire format, CLI flags, persisted schema, or rules-engine
    behaviour.

    Why it matters here: `plan_integrate` cherry-picks the *tip* steps
    of a Completed plan onto a dedicated `flowd-integrate/<project>/<plan>`
    branch in topological order. Each tip's commit message is the one
    that ships once the operator promotes via fast-forward, so the
    message has to read as a coherent change to the base history --
    not an ad-hoc step note.

    Engine caveat: the rules engine cannot inspect commit messages,
    diff bodies, or git topology. ProposedAction carries only
    `{ tool, file_path, project }`. This rule surfaces via
    `rules_list` as advisory guidance on shell-class invocations; the
    agent is responsible for honoring the format when it actually
    composes a commit, plan-step output, or integration message.
  match: "^(Bash|shell|shell_exec|run_command|run_terminal_cmd)$"
