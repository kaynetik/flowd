id: hooks-swallow-errors-by-design
scope: "integrations/claude-code/hooks/**"
level: warn
description: |
  Hooks under integrations/claude-code/hooks/ (session-start.sh,
  post-tool-use.sh, session-end.sh, _lib.sh) intentionally swallow
  errors so they never block Claude Code. A future agent will look at
  the missing error handling and try to "fix" it -- don't.

  Persistence guarantees go through MCP (`memory_store`), not hooks.
  See README "Recommendations" before changing the error-handling shape
  of any script in this directory.
match: "integrations/claude-code/hooks/.*\\.(sh|bash)$"
