id: karpathy-goal-driven
scope: "**"
level: warn
description: |
  ## 4. Goal-Driven Execution

  **Define success criteria. Loop until verified.**

  Transform tasks into verifiable goals:
  - "Add validation" → "Write tests for invalid inputs, then make them pass"
  - "Fix the bug" → "Write a test that reproduces it, then make it pass"
  - "Refactor X" → "Ensure tests pass before and after"

  For multi-step tasks, state a brief plan:
  ```
  1. [Step] → verify: [check]
  2. [Step] → verify: [check]
  3. [Step] → verify: [check]
  ```

  Strong success criteria let you loop independently. Weak criteria ("make it work") require constant clarification.

  The rules engine cannot inspect shell command arguments
  (ProposedAction carries no command string), so this rule fires on
  matching tool invocations as advisory guidance surfaced via
  `rules_list`. The agent is responsible for honoring the constraint
  in the actual command it runs. For Write, Edit, and MultiEdit (and
  equivalently named tools), the engine likewise does not inspect edit
  bodies; the agent must apply this guideline in the actual edits it
  makes.
match: "^(Bash|Write|Edit|MultiEdit|shell|shell_exec|run_command|run_terminal_cmd)$"
